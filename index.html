    <script>
      // Protect window.fetch from being overwritten by polyfills
      (function() {
        try {
          const originalFetch = window.fetch;
          if (originalFetch) {
            // Define a property with both getter and setter to prevent "only a getter" errors
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function(v) { 
                console.warn('ELN: Attempted to overwrite fetch, blocked to prevent TypeError.');
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn('ELN: Could not protect fetch.', e);
        }
      })();
    </script>
